# This test exposes a bug in AgentgatewayParameters merging.
#
# When GatewayClass sets istio.caAddress and Gateway sets istio.trustDomain,
# the Gateway's AGWP completely replaces the Istio struct instead of merging
# field-by-field. This causes caAddress to be lost.
#
# Expected behavior: Both caAddress and trustDomain should be present in output.
# Actual behavior (bug): Only trustDomain is present; caAddress is lost.
#
# NOTE: We use a non-default caAddress value because the helm template has
# a default fallback of "https://istiod.istio-system.svc:15012". Using that
# default would mask the bug.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: gwc-params
  namespace: default
spec:
  istio:
    caAddress: https://my-custom-istiod.custom-namespace.svc:15012
    # trustDomain intentionally not set - should come from Gateway AGWP
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: gw-params
  namespace: default
spec:
  istio:
    # caAddress intentionally not set - should be preserved from GWC AGWP
    trustDomain: my-custom-trust-domain
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: agentgateway
spec:
  controllerName: agentgateway.dev/agentgateway
  description: Specialized class for agentgateway.
  parametersRef:
    group: agentgateway.dev
    kind: AgentgatewayParameters
    name: gwc-params
    namespace: default
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
  namespace: default
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: gw-params
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: Same
