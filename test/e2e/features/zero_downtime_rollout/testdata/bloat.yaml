---
# Extra services + routes used only by TestZeroDowntimeControllerRestart to
# widen the per-client xDS translation window on a fresh kgateway controller.
# The reconnect-time race lives in snapshotPerClient: a partial snapshot can
# be published before all referenced EDS clusters and their
# ClusterLoadAssignments are merged for a new uniquely connected client. More
# clusters/endpoints to translate => larger window => more reliable repro.
apiVersion: v1
kind: Service
metadata:
  name: bloat-svc-1
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http-web-svc
---
apiVersion: v1
kind: Service
metadata:
  name: bloat-svc-2
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
