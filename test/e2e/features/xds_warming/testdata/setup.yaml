apiVersion: v1
kind: ConfigMap
metadata:
  name: warming-old-index
  namespace: kgateway-base
data:
  index.html: |
    xds-warming-old
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: warming-new-index
  namespace: kgateway-base
data:
  index.html: |
    xds-warming-new
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warming-old
  namespace: kgateway-base
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: warming-old
  template:
    metadata:
      labels:
        app.kubernetes.io/name: warming-old
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: nginx
          image: nginx:1.28.0
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: index
          configMap:
            name: warming-old-index
---
apiVersion: v1
kind: Service
metadata:
  name: warming-old
  namespace: kgateway-base
spec:
  selector:
    app.kubernetes.io/name: warming-old
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: warming-new
  namespace: kgateway-base
spec:
  selector:
    app.kubernetes.io/name: warming-new
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xds-warming
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "xds-warming.example.com"
  rules:
    - backendRefs:
        - name: warming-old
          port: 8080
