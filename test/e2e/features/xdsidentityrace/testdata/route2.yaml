apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xdsrace-route2
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "xdsrace.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /route2
      backendRefs:
        - name: xdsrace-backend
          port: 8080
