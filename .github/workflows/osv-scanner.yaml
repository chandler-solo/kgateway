name: OSV Security Vulnerability Scan

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan (${{ matrix.branch }})
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        branch:
          # Allowlist of branches scanned daily.
          - main
          - v2.2.x
    steps:
    - name: Checkout branch
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false
        ref: ${{ matrix.branch }}

    - name: Collect upload metadata
      id: metadata
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "ref=refs/heads/${{ matrix.branch }}"
          echo "sha=$(git rev-parse HEAD)"
          echo "category=osv-scanner-$(echo '${{ matrix.branch }}' | tr '/.' '--')"
        } >> "$GITHUB_OUTPUT"

    - name: Run scanner
      uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9 # v2.3.5
      with:
        scan-args: |-
          --output=results.json
          --format=json
          -r
          ./
      continue-on-error: true

    - name: Convert results to SARIF
      uses: google/osv-scanner-action/osv-reporter-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9 # v2.3.5
      with:
        scan-args: |-
          --output=results.sarif
          --new=results.json
          --gh-annotations=false
          --fail-on-vuln=true

    - name: Upload SARIF
      if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
      with:
        sarif_file: results.sarif
        ref: ${{ steps.metadata.outputs.ref }}
        sha: ${{ steps.metadata.outputs.sha }}
        category: ${{ steps.metadata.outputs.category }}

    - name: Print Code Scanning URL
      if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
      shell: bash
      run: |
        echo "View the OSV-Scanner results in Security -> Code scanning:"
        echo "${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is%3Aopen+branch%3A${{ matrix.branch }}+tool%3Aosv-scanner"
