name: Verify Helm Schema Sync
on:
  pull_request:
    paths:
      - install/helm/kgateway/values.yaml
      - install/helm/kgateway/values.schema.json
      - hack/utils/verify-helm-schema/**
  push:
    branches: [main]
    paths:
      - install/helm/kgateway/values.yaml
      - install/helm/kgateway/values.schema.json
      - hack/utils/verify-helm-schema/**

permissions:
  contents: read

jobs:
  verify-helm-schema:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: hack/utils/verify-helm-schema/go.mod
          cache-dependency-path: hack/utils/verify-helm-schema/go.sum
      - run: make verify-helm-schema
