name: Formal Verification

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "devel/formal/**"
      - "pkg/kgateway/proxy_syncer/**"
      - ".github/workflows/formal-verification.yaml"
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lean:
    name: Lean xDS spec
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - name: Cache Lean toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('devel/formal/lean/lean-toolchain') }}
      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -x "$HOME/.elan/bin/lake" ]]; then
            curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Re-check proofs, model-check the spec, and conformance-check an implementation trace
        run: make formal-lean
