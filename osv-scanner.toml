# Format reference: https://google.github.io/osv-scanner/configuration/

# The following five CVEs are flagged against istio.io/istio, which we pin
# to the Go pseudo-version `v0.0.0-20251218162427-600ea84d2996`.
#
# OSV-Scanner compares the literal "0.0.0" prefix against the CVE's fixed
# version (all of which are Istio 1.x releases from 2019-2022) and concludes
# "0.0.0 < 1.x", firing a false positive. In reality the pseudo-version's
# embedded timestamp (20251218162427 = 2025-12-18 16:24:27 UTC) is years
# after every fix below, so the pinned commit includes all of these fixes.

[[IgnoredVulns]]
id = "CVE-2019-14993"
reason = "False positive: istio.io/istio pseudo-version v0.0.0-20251218162427-600ea84d2996 is a 2025-12-18 commit, ~6 years after the fix in Istio 1.1.13 / 1.2.4 (2019-08)."

