# helm.sh/helm/v3 is pinned to 3.19.5. The fix in 3.20.2 cascades a forced
# upgrade to k8s.io/client-go v0.35+, which adds bookmark-event requirements
# that the istio fake client (pinned for backport stability) cannot satisfy,
# causing unit test hangs. The CVE only affects `helm pull --untar` with
# attacker-controlled chart names; kgateway uses helm as a Go library to
# render its own bundled charts and never pulls or extracts external charts
# from untrusted sources.
[[IgnoredVulns]]
id = "CVE-2026-35206"
reason = "Not exploitable: kgateway uses helm as a library to render its own bundled charts; it never invokes `helm pull --untar` or extracts attacker-controlled chart archives. Cannot bump to 3.20.2 because that forces k8s.io/client-go v0.35+, which is incompatible with the pinned istio fake client used in unit tests."
